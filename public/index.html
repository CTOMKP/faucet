<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CTO Faucet</title>
  <style>
    :root {
      --bg:#0b0b0b;
      --bg2:#141414;
      --card:#121212;
      --border:#242424;
      --text:#f5f5f5;
      --muted:#a3a3a3;
      --purple:#7c3aed;
      --green:#22c55e;
      --danger:#ef4444;
    }
    body {
      margin:0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background:
        url('/why-img.svg') center center / 100% 100% no-repeat,
        radial-gradient(900px 400px at -10% -20%, rgba(124,58,237,.24) 0%, transparent 55%),
        radial-gradient(800px 300px at 110% 0%, rgba(34,197,94,.18) 0%, transparent 45%),
        linear-gradient(160deg, var(--bg), var(--bg2));
      color:var(--text);
      min-height:100vh;
      overflow-x: hidden;
      display: flex;
      align-items: center;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(8, 8, 8, 0.72);
      pointer-events: none;
      z-index: 0;
    }
    .wrap { max-width: 640px; margin: 0 auto; padding: 24px; width: 100%; }
    .wrap { position: relative; z-index: 1; }
    .card {
      background:linear-gradient(180deg, rgba(18,18,18,.95), rgba(10,10,10,.95));
      border:1px solid var(--border);
      border-radius:16px;
      padding:24px;
      box-shadow: 0 10px 35px rgba(0,0,0,.35);
    }
    h1 { margin:0 0 8px; font-size: 1.8rem; }
    p { color: var(--muted); margin: 0 0 20px; }
    input, button { width:100%; box-sizing:border-box; border-radius:10px; border:1px solid #2b2b2b; padding:12px 14px; font-size:1rem; }
    input { background:#0f0f0f; color:var(--text); }
    input:focus { outline:none; border-color: var(--purple); box-shadow: 0 0 0 3px rgba(124,58,237,.2); }
    button {
      margin-top:12px;
      background: linear-gradient(135deg, var(--purple), #6d28d9);
      color:#fff;
      font-weight:700;
      cursor:pointer;
      border:none;
    }
    button:disabled { opacity:.65; cursor:not-allowed; }
    .msg { margin-top:14px; font-size:.95rem; }
    .ok { color: var(--green); }
    .err { color: var(--danger); }
    .note { margin-top:18px; font-size:.85rem; color: var(--muted); }
    .allocation {
      margin: 0 0 16px;
      font-size: .9rem;
      color: #e5e5e5;
    }
    .badge {
      display:inline-block;
      margin-bottom:12px;
      padding:6px 10px;
      border:1px solid #2c2c2c;
      border-radius:999px;
      font-size:.75rem;
      color:#d4d4d4;
      background:rgba(255,255,255,.02);
    }
    .brand {
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:12px;
    }
    .brand img {
      width:34px;
      height:34px;
      border-radius:8px;
      object-fit:contain;
      background:#0e0e0e;
      border:1px solid #2d2d2d;
      padding:3px;
    }
    .brand span {
      font-size:.92rem;
      color:#d4d4d4;
      letter-spacing:.04em;
      text-transform:uppercase;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="brand">
        <img src="/cto-logo-small.png" alt="CTO Marketplace logo" />
        <span>CTO Marketplace</span>
      </div>
      <span class="badge">Solana Devnet Faucet</span>
      <h1>CTO Solana Faucet</h1>
      <p>Enter your Solana wallet to receive test funds (USDC + SOL gas).</p>
      <div class="allocation">Per request: <strong>10 USDC</strong> + <strong>0.01 SOL</strong> (gas).</div>
      <form id="faucetForm">
        <input id="wallet" placeholder="Solana wallet address" required />
        <button id="submitBtn" type="submit">Request Faucet</button>
      </form>
      <div id="msg" class="msg"></div>
      <div class="note">One request per cooldown window. Abuse is rate-limited.</div>
    </div>
  </div>

  <script>
    const form = document.getElementById('faucetForm');
    const wallet = document.getElementById('wallet');
    const msg = document.getElementById('msg');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.textContent = '';
      msg.className = 'msg';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';

      try {
        const res = await fetch('/api/faucet/request', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ walletAddress: wallet.value.trim() })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || data.success === false) throw new Error(data.message || 'Request failed');
        msg.classList.add('ok');
        msg.textContent = data.message || 'Faucet request sent successfully.';
      } catch (err) {
        msg.classList.add('err');
        msg.textContent = err.message || 'Something went wrong';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Request Faucet';
      }
    });
  </script>
</body>
</html>
