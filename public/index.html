<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CTO Faucet</title>
  <style>
    :root { --bg:#0d1117; --card:#161b22; --text:#e6edf3; --muted:#9da7b3; --accent:#00d084; --danger:#ff6b6b; }
    body { margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: radial-gradient(1200px 500px at 20% -20%, #1f2937 0, var(--bg) 60%); color:var(--text); }
    .wrap { max-width: 640px; margin: 8vh auto; padding: 24px; }
    .card { background:var(--card); border:1px solid #2d333b; border-radius:16px; padding:24px; box-shadow: 0 8px 30px rgba(0,0,0,.25); }
    h1 { margin:0 0 8px; font-size: 1.8rem; }
    p { color: var(--muted); margin: 0 0 20px; }
    input, button { width:100%; box-sizing:border-box; border-radius:10px; border:1px solid #30363d; padding:12px 14px; font-size:1rem; }
    input { background:#0d1117; color:var(--text); }
    button { margin-top:12px; background:var(--accent); color:#06210f; font-weight:700; cursor:pointer; border:none; }
    button:disabled { opacity:.65; cursor:not-allowed; }
    .msg { margin-top:14px; font-size:.95rem; }
    .ok { color: var(--accent); }
    .err { color: var(--danger); }
    .note { margin-top:18px; font-size:.85rem; color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>CTO Solana Faucet</h1>
      <p>Enter your Solana wallet to receive test funds (USDC + SOL gas).</p>
      <form id="faucetForm">
        <input id="wallet" placeholder="Solana wallet address" required />
        <button id="submitBtn" type="submit">Request Faucet</button>
      </form>
      <div id="msg" class="msg"></div>
      <div class="note">One request per cooldown window. Abuse is rate-limited.</div>
    </div>
  </div>

  <script>
    const form = document.getElementById('faucetForm');
    const wallet = document.getElementById('wallet');
    const msg = document.getElementById('msg');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.textContent = '';
      msg.className = 'msg';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';

      try {
        const res = await fetch('/api/faucet/request', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ walletAddress: wallet.value.trim() })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.message || 'Request failed');

        msg.classList.add('ok');
        msg.textContent = data.message || 'Faucet request sent successfully.';
      } catch (err) {
        msg.classList.add('err');
        msg.textContent = err.message || 'Something went wrong';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Request Faucet';
      }
    });
  </script>
</body>
</html>
